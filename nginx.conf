# nginx.conf para o servidor host
# Deve ser configurado no host, por exemplo em /etc/nginx/sites-available/financas

server {
    listen 80;
    server_name app.seudominio.com; # Subdomínio do Frontend

    location / {
        proxy_pass http://localhost:8081; # Porta exposta pelo container frontend no docker-compose.yml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.seudominio.com; # Subdomínio do Backend

    location / {
        proxy_pass http://localhost:8080; # Porta exposta pelo container backend no docker-compose.yml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
